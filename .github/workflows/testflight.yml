name: Build & Upload to TestFlight

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate Xcode Project with xcodegen
        run: |
          brew install xcodegen
          xcodegen generate -s project.yml

      - name: Setup API Key
        env:
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          APPSTORE_KEY: ${{ secrets.AUTHKEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Build and Sign Archive
        env:
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
        run: |
          mkdir -p build
          # Build archive
          xcodebuild archive \
            -project MagRabbit.xcodeproj \
            -scheme MagRabbit \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath ./build/MagRabbit.xcarchive \
            -derivedDataPath ./build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p build/export
          # Extract app from archive and create IPA manually
          APP_PATH="./build/MagRabbit.xcarchive/Products/Applications/MagRabbit.app"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r export/MagRabbit.ipa Payload && cd ..

      - name: Upload to TestFlight
        run: |
          # Upload using altool with proper credentials
          xcrun altool \
            --upload-app \
            --type ios \
            --file ./build/export/MagRabbit.ipa \
            --api-key-id "${{ secrets.AUTHKEY_KEY_ID }}" \
            --api-issuer-id "${{ secrets.AUTHKEY_ISSUER_ID }}" \
            --api-private-key-path "${HOME}/.appstoreconnect/private_keys/AuthKey_${{ secrets.AUTHKEY_KEY_ID }}.p8"

