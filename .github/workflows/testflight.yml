name: Build & Upload to TestFlight

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate Xcode Project from SPM
        run: |
          swift package generate-xcodeproj
          ls -la MagRabbit.xcodeproj/ || echo "Project generated"

      - name: Build Archive
        run: |
          mkdir -p build
          xcodebuild archive \
            -scheme MagRabbit \
            -configuration Release \
            -archivePath ./build/MagRabbit.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="MagRabbit AppStore"

      - name: Export IPA
        run: |
          mkdir -p build/export
          xcodebuild -exportArchive \
            -archivePath ./build/MagRabbit.xcarchive \
            -exportPath ./build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Setup AuthKey
        run: |
          mkdir -p ~/.appstoreconnect/keys
          echo "${{ secrets.AUTHKEY }}" | base64 -d > ~/.appstoreconnect/keys/AuthKey_${{ secrets.AUTHKEY_KEY_ID }}.p8

      - name: Upload to TestFlight
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file ./build/export/MagRabbit.ipa \
            --apiKey ~/.appstoreconnect/keys/AuthKey_${{ secrets.AUTHKEY_KEY_ID }}.p8 \
            --apiIssuer ${{ secrets.AUTHKEY_ISSUER_ID }} \
            --teamID ${{ secrets.APPLE_TEAM_ID }}

      - name: Notify Slack (optional)
        if: always() && secrets.SLACK_WEBHOOK != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'TestFlight Build: ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
