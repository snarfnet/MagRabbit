name: Build & Upload to TestFlight

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Register App in App Store Connect
        env:
          AUTHKEY_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          AUTHKEY_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          AUTHKEY: ${{ secrets.AUTHKEY }}
        run: |
          chmod +x ./scripts/auto_register_asc.sh
          ./scripts/auto_register_asc.sh || echo "App already registered"

      - name: Generate Xcode Project with xcodegen
        run: |
          brew install xcodegen
          xcodegen generate -s project.yml

      - name: Setup API Key
        env:
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          APPSTORE_KEY: ${{ secrets.AUTHKEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Build and Sign Archive
        env:
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
        run: |
          mkdir -p build
          # Build archive
          xcodebuild archive \
            -project MagRabbit.xcodeproj \
            -scheme MagRabbit \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath ./build/MagRabbit.xcarchive \
            -derivedDataPath ./build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p build/export
          # Extract app from archive and create IPA manually
          APP_PATH="./build/MagRabbit.xcarchive/Products/Applications/MagRabbit.app"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r export/MagRabbit.ipa Payload && cd ..

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          IPA_FILE: ./build/export/MagRabbit.ipa
        run: |
          # Setup key file with explicit path
          KEY_FILE="${HOME}/.private_keys/AuthKey_${API_KEY_ID}.p8"
          mkdir -p "${HOME}/.private_keys"
          cp "${HOME}/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8" "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          # Verify IPA exists
          if [ ! -f "$IPA_FILE" ]; then
            echo "❌ IPA file not found: $IPA_FILE"
            ls -la ./build/export/
            exit 1
          fi

          echo "📤 Uploading to TestFlight..."
          echo "IPA: $IPA_FILE"
          echo "Key: $KEY_FILE"

          # Upload with explicit file reference
          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_FILE" \
            --api-issuer "$API_ISSUER_ID" \
            --api-key "$KEY_FILE"

