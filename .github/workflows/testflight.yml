name: Build & Upload to TestFlight

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      register_bundle_id:
        description: Register Bundle ID on App Store Connect
        required: false
        type: boolean
        default: true
      upload_testflight:
        description: Upload to TestFlight after building
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Register Bundle ID on App Store Connect
        if: ${{ github.event_name == 'push' || inputs.register_bundle_id || inputs.upload_testflight }}
        env:
          AUTHKEY_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          AUTHKEY_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          AUTHKEY: ${{ secrets.AUTHKEY }}
        run: |
          chmod +x ./scripts/register_bundle_id.sh
          ./scripts/register_bundle_id.sh

      - name: Generate Xcode Project with xcodegen
        run: |
          brew install xcodegen
          xcodegen generate -s project.yml

      - name: Setup API Key
        if: ${{ github.event_name == 'push' || inputs.upload_testflight }}
        env:
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          APPSTORE_KEY: ${{ secrets.AUTHKEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Install signing certificate and provisioning profile
        if: ${{ github.event_name == 'push' || inputs.upload_testflight }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ] || [ -z "$P12_PASSWORD" ] || [ -z "$PROVISIONING_PROFILE_BASE64" ]; then
            echo "Missing signing secrets. Set BUILD_CERTIFICATE_BASE64, P12_PASSWORD, and PROVISIONING_PROFILE_BASE64."
            exit 1
          fi

          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-temporary-ci-keychain-password}"
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

          {
            echo "PROFILE_UUID=${PROFILE_UUID}"
            echo "PROFILE_NAME=${PROFILE_NAME}"
            echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}"
          } >> "$GITHUB_ENV"

      - name: Build and Sign Archive
        env:
          UPLOAD_TESTFLIGHT: ${{ github.event_name == 'push' || inputs.upload_testflight }}
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p build

          if [ "$UPLOAD_TESTFLIGHT" = "true" ]; then
            xcodebuild archive \
              -project MagRabbit.xcodeproj \
              -scheme MagRabbit \
              -configuration Release \
              -destination generic/platform=iOS \
              -archivePath ./build/MagRabbit.xcarchive \
              -derivedDataPath ./build/DerivedData \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="Apple Distribution" \
              PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME"
          else
            xcodebuild archive \
              -project MagRabbit.xcodeproj \
              -scheme MagRabbit \
              -configuration Release \
              -destination generic/platform=iOS \
              -archivePath ./build/MagRabbit.xcarchive \
              -derivedDataPath ./build/DerivedData \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          fi

      - name: Create IPA
        env:
          UPLOAD_TESTFLIGHT: ${{ github.event_name == 'push' || inputs.upload_testflight }}
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p build/export

          if [ "$UPLOAD_TESTFLIGHT" = "true" ]; then
            cat > build/ExportOptions.ci.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.magrabbit.MagRabbit</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

            xcodebuild -exportArchive \
              -archivePath ./build/MagRabbit.xcarchive \
              -exportPath ./build/export \
              -exportOptionsPlist build/ExportOptions.ci.plist
          else
            APP_PATH="./build/MagRabbit.xcarchive/Products/Applications/MagRabbit.app"
            mkdir -p build/Payload
            cp -r "$APP_PATH" build/Payload/
            cd build && zip -r export/MagRabbit.ipa Payload && cd ..
          fi

      - name: Setup Ruby
        if: ${{ github.event_name == 'push' || inputs.upload_testflight }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - name: Install Fastlane
        if: ${{ github.event_name == 'push' || inputs.upload_testflight }}
        run: gem install fastlane

      - name: Upload to TestFlight with Fastlane
        if: ${{ github.event_name == 'push' || inputs.upload_testflight }}
        env:
          API_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.AUTHKEY }}
        run: |
          # Setup API Key
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          # Verify API key file exists
          if [ ! -f ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 ]; then
            echo "ERROR: API key file not created"
            exit 1
          fi

          # Upload via Fastlane
          fastlane upload_testflight ipa_path:./build/export/MagRabbit.ipa api_key_path:$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Save IPA as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MagRabbit-IPA
          path: ./build/export/MagRabbit.ipa
          retention-days: 30
