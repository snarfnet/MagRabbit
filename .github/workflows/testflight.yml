name: Build & Upload to TestFlight

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate Xcode Project with xcodegen
        run: |
          brew install xcodegen
          xcodegen generate -s project.yml

      - name: Setup API Key
        env:
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          APPSTORE_KEY: ${{ secrets.AUTHKEY }}
        run: |
          mkdir -p ~/.appstoreconnect/keys
          echo "$APPSTORE_KEY" | base64 -d > ~/.appstoreconnect/keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Build Archive with automatic provisioning
        env:
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
        run: |
          mkdir -p build
          xcodebuild archive \
            -project MagRabbit.xcodeproj \
            -scheme MagRabbit \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath ./build/MagRabbit.xcarchive \
            -derivedDataPath ./build/DerivedData \
            -authenticationKeyID "$APPSTORE_KEY_ID" \
            -authenticationKeyIssuerID "${{ secrets.AUTHKEY_ISSUER_ID }}" \
            -authenticationKeyPath ~/.appstoreconnect/keys/AuthKey_${APPSTORE_KEY_ID}.p8 \
            -allowProvisioningUpdates

      - name: Export IPA
        run: |
          mkdir -p build/export
          xcodebuild -exportArchive \
            -archivePath ./build/MagRabbit.xcarchive \
            -exportPath ./build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        env:
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file ./build/export/MagRabbit.ipa \
            --apiKey ~/.appstoreconnect/keys/AuthKey_${APPSTORE_KEY_ID}.p8 \
            --apiIssuer ${{ secrets.AUTHKEY_ISSUER_ID }} \
            --teamID ${{ secrets.APPLE_TEAM_ID }}

