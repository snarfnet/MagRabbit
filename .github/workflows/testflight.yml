name: Build & Upload to TestFlight

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: |
          cd MagRabbit
          # CocoaPods or SPM dependencies (if needed)
          # pod install

      - name: Build Archive
        run: |
          cd MagRabbit
          xcodebuild archive \
            -scheme MagRabbit \
            -configuration Release \
            -archivePath ./build/MagRabbit.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="MagRabbit AppStore"

      - name: Export IPA
        run: |
          cd MagRabbit
          xcodebuild -exportArchive \
            -archivePath ./build/MagRabbit.xcarchive \
            -exportPath ./build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight
        run: |
          cd MagRabbit/build/export
          xcrun altool \
            --upload-app \
            --type ios \
            --file MagRabbit.ipa \
            --username ${{ secrets.APPLE_ID }} \
            --password ${{ secrets.APPLE_PASSWORD }} \
            --app-specific-password ${{ secrets.APP_SPECIFIC_PASSWORD }}

      - name: Notify Slack (optional)
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'TestFlight Build: ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
