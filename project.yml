name: MagRabbit
options:
  bundleIdPrefix: com.magrabbit
  deploymentTarget:
    iOS: "17.0"
  developmentTeam: JGQD8PLNN8

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 12.0.0

targets:
  MagRabbit:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/MagRabbit
      - path: Sources/MagRabbit/Data
        createIntermediateGroups: true
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      DEVELOPMENT_TEAM: JGQD8PLNN8
      CODE_SIGN_STYLE: Automatic
      CURRENT_PROJECT_VERSION: "2"
      TARGETED_DEVICE_FAMILY: "1"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: MagRabbit
        CFBundleDisplayName: 海外のマニアックな雑誌紹介
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        GADApplicationIdentifier: ca-app-pub-9404799280370656~2336419688
        ITSAppUsesNonExemptEncryption: false
        UIDeviceFamily:
          - 1
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities:
          - armv7
        NSUserTrackingUsageDescription: This identifier may be used to show relevant ads and measure ad performance.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
