name: Build & Upload to TestFlight

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Generate Xcode Project with xcodegen
        run: |
          brew install xcodegen
          xcodegen generate -s project.yml

      - name: Build Archive
        run: |
          mkdir -p build
          xcodebuild archive \
            -project MagRabbit.xcodeproj \
            -scheme MagRabbit \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath ./build/MagRabbit.xcarchive \
            -allowProvisioningUpdates \
            -derivedDataPath ./build/DerivedData

      - name: Export IPA
        run: |
          mkdir -p build/export
          xcodebuild -exportArchive \
            -archivePath ./build/MagRabbit.xcarchive \
            -exportPath ./build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Setup AuthKey
        run: |
          mkdir -p ~/.appstoreconnect/keys
          echo "${{ secrets.AUTHKEY }}" | base64 -d > ~/.appstoreconnect/keys/AuthKey_${{ secrets.AUTHKEY_KEY_ID }}.p8

      - name: Upload to TestFlight
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file ./build/export/MagRabbit.ipa \
            --apiKey ~/.appstoreconnect/keys/AuthKey_${{ secrets.AUTHKEY_KEY_ID }}.p8 \
            --apiIssuer ${{ secrets.AUTHKEY_ISSUER_ID }} \
            --teamID ${{ secrets.APPLE_TEAM_ID }}

