name: Build & Upload to TestFlight

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      register_bundle_id:
        description: Register Bundle ID on App Store Connect
        required: false
        type: boolean
        default: true
      upload_testflight:
        description: Upload to TestFlight after building
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Register Bundle ID on App Store Connect
        if: ${{ github.event_name == 'push' || inputs.register_bundle_id || inputs.upload_testflight }}
        env:
          AUTHKEY_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          AUTHKEY_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          AUTHKEY: ${{ secrets.AUTHKEY }}
        run: |
          chmod +x ./scripts/register_bundle_id.sh
          ./scripts/register_bundle_id.sh

      - name: Generate Xcode Project with xcodegen
        run: |
          brew install xcodegen
          xcodegen generate -s project.yml

      - name: Setup API Key
        if: ${{ github.event_name == 'push' || inputs.upload_testflight }}
        env:
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          APPSTORE_KEY: ${{ secrets.AUTHKEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Build and Sign Archive
        env:
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
        run: |
          mkdir -p build
          # Build archive
          xcodebuild archive \
            -project MagRabbit.xcodeproj \
            -scheme MagRabbit \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath ./build/MagRabbit.xcarchive \
            -derivedDataPath ./build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p build/export
          # Extract app from archive and create IPA manually
          APP_PATH="./build/MagRabbit.xcarchive/Products/Applications/MagRabbit.app"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r export/MagRabbit.ipa Payload && cd ..

      - name: Setup Ruby
        if: ${{ github.event_name == 'push' || inputs.upload_testflight }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - name: Install Fastlane
        if: ${{ github.event_name == 'push' || inputs.upload_testflight }}
        run: gem install fastlane

      - name: Upload to TestFlight with Fastlane
        if: ${{ github.event_name == 'push' || inputs.upload_testflight }}
        env:
          API_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.AUTHKEY }}
        run: |
          # Setup API Key
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          # Verify API key file exists
          if [ ! -f ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 ]; then
            echo "ERROR: API key file not created"
            exit 1
          fi

          # Upload via Fastlane
          fastlane upload_testflight ipa_path:./build/export/MagRabbit.ipa api_key_path:$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Save IPA as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MagRabbit-IPA
          path: ./build/export/MagRabbit.ipa
          retention-days: 30
