name: Build & Upload to TestFlight

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Register App in App Store Connect
        env:
          AUTHKEY_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          AUTHKEY_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          AUTHKEY: ${{ secrets.AUTHKEY }}
        run: |
          chmod +x ./scripts/auto_register_asc.sh
          ./scripts/auto_register_asc.sh || echo "App already registered"

      - name: Generate Xcode Project with xcodegen
        run: |
          brew install xcodegen
          xcodegen generate -s project.yml

      - name: Setup API Key
        env:
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          APPSTORE_KEY: ${{ secrets.AUTHKEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Build and Sign Archive
        env:
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
        run: |
          mkdir -p build
          # Build archive
          xcodebuild archive \
            -project MagRabbit.xcodeproj \
            -scheme MagRabbit \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath ./build/MagRabbit.xcarchive \
            -derivedDataPath ./build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p build/export
          # Extract app from archive and create IPA manually
          APP_PATH="./build/MagRabbit.xcarchive/Products/Applications/MagRabbit.app"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r export/MagRabbit.ipa Payload && cd ..

      - name: Save IPA as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MagRabbit-IPA
          path: ./build/export/MagRabbit.ipa
          retention-days: 30

      - name: Upload to TestFlight (Manual)
        if: always()
        run: |
          echo "✅ IPA が生成されました！"
          echo ""
          echo "📱 TestFlight にアップロード:"
          echo "  1. GitHub Actions → Artifacts → MagRabbit-IPA をダウンロード"
          echo "  2. Xcode → Organizer → Distribute App"
          echo "  3. TestFlight → アップロード"
          echo ""
          echo "または、App Store Connect で直接アップロード可能です。"

