name: Build & Upload to TestFlight

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      register_bundle_id:
        description: Register Bundle ID on App Store Connect
        required: false
        type: boolean
        default: true
      upload_testflight:
        description: Upload to TestFlight after building
        required: false
        type: boolean
        default: false
      submit_app_review:
        description: Submit uploaded build to App Review
        required: false
        type: boolean
        default: false
      list_certificates:
        description: List signing certificates and stop
        required: false
        type: boolean
        default: false
      revoke_certificate_id:
        description: Certificate ID(s) to revoke before building, separated by comma or space
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Register Bundle ID on App Store Connect
        if: ${{ github.event_name == 'push' || inputs.register_bundle_id || inputs.upload_testflight || inputs.submit_app_review }}
        env:
          AUTHKEY_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          AUTHKEY_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          AUTHKEY: ${{ secrets.AUTHKEY }}
        run: |
          chmod +x ./scripts/register_bundle_id.sh
          ./scripts/register_bundle_id.sh

      - name: List or revoke signing certificates
        if: ${{ inputs.list_certificates || inputs.revoke_certificate_id != '' }}
        env:
          AUTHKEY_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          AUTHKEY_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          AUTHKEY: ${{ secrets.AUTHKEY }}
          REVOKE_CERTIFICATE_ID: ${{ inputs.revoke_certificate_id }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${AUTHKEY_KEY_ID}.p8"
          echo "$AUTHKEY" | base64 -d > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          generate_jwt() {
            KEY_PATH="$KEY_PATH" AUTHKEY_KEY_ID="$AUTHKEY_KEY_ID" AUTHKEY_ISSUER_ID="$AUTHKEY_ISSUER_ID" ruby -ropenssl -rjson -rbase64 <<'RUBY'
          def base64_url(value)
            Base64.urlsafe_encode64(value, padding: false)
          end

          def int_to_fixed_bytes(value)
            value.to_s(16).rjust(64, "0").scan(/../).map { |byte| byte.to_i(16) }.pack("C*")
          end

          now = Time.now.to_i
          header = { alg: "ES256", kid: ENV.fetch("AUTHKEY_KEY_ID"), typ: "JWT" }
          payload = { iss: ENV.fetch("AUTHKEY_ISSUER_ID"), iat: now, exp: now + 20 * 60, aud: "appstoreconnect-v1" }
          token_body = [base64_url(JSON.generate(header)), base64_url(JSON.generate(payload))].join(".")
          key = OpenSSL::PKey.read(File.read(ENV.fetch("KEY_PATH")))
          der_signature = key.sign(OpenSSL::Digest::SHA256.new, token_body)
          asn1_signature = OpenSSL::ASN1.decode(der_signature)
          r = int_to_fixed_bytes(asn1_signature.value[0].value)
          s = int_to_fixed_bytes(asn1_signature.value[1].value)
          puts [token_body, base64_url(r + s)].join(".")
          RUBY
          }

          JWT=$(generate_jwt)

          if [ -n "$REVOKE_CERTIFICATE_ID" ]; then
            for CERTIFICATE_ID in $(echo "$REVOKE_CERTIFICATE_ID" | tr ',' ' '); do
              echo "Revoking certificate: ${CERTIFICATE_ID}"
              curl -sS -X DELETE "https://api.appstoreconnect.apple.com/v1/certificates/${CERTIFICATE_ID}" \
                -H "Authorization: Bearer ${JWT}" \
                -H "Content-Type: application/json" \
                -o "$RUNNER_TEMP/revoke-response-${CERTIFICATE_ID}.json" \
                -w "%{http_code}" > "$RUNNER_TEMP/revoke-status-${CERTIFICATE_ID}.txt"
              STATUS=$(cat "$RUNNER_TEMP/revoke-status-${CERTIFICATE_ID}.txt")
              if [ "$STATUS" != "204" ]; then
                cat "$RUNNER_TEMP/revoke-response-${CERTIFICATE_ID}.json"
                exit 1
              fi
              echo "Certificate revoked: ${CERTIFICATE_ID}"
            done
          fi

          RESPONSE=$(curl -sS -X GET "https://api.appstoreconnect.apple.com/v1/certificates?limit=200&fields%5Bcertificates%5D=name,certificateType,displayName,serialNumber,platform,expirationDate,activated" \
            -H "Authorization: Bearer ${JWT}" \
            -H "Content-Type: application/json")

          echo "$RESPONSE" | ruby -rjson -e '
            json = JSON.parse(STDIN.read)
            if json["errors"]
              warn JSON.pretty_generate(json)
              exit 1
            end
            puts "CERTIFICATE_ID | TYPE | EXPIRES | ACTIVE | DISPLAY_NAME | SERIAL"
            json.fetch("data", []).sort_by { |item| item.dig("attributes", "expirationDate").to_s }.each do |item|
              a = item.fetch("attributes", {})
              puts [
                item["id"],
                a["certificateType"],
                a["expirationDate"],
                a["activated"],
                a["displayName"] || a["name"],
                a["serialNumber"]
              ].join(" | ")
            end
          '

          if [ "${{ inputs.list_certificates }}" = "true" ]; then
            echo "Certificate listing complete. Stop here so a certificate can be chosen safely."
            exit 1
          fi

      - name: Generate Xcode Project with xcodegen
        run: |
          brew install xcodegen
          xcodegen generate -s project.yml

      - name: Setup API Key
        if: ${{ github.event_name == 'push' || inputs.upload_testflight || inputs.submit_app_review }}
        env:
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          APPSTORE_KEY: ${{ secrets.AUTHKEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8

      - name: Build and Sign Archive
        env:
          UPLOAD_TESTFLIGHT: ${{ github.event_name == 'push' || inputs.upload_testflight || inputs.submit_app_review }}
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p build

          if [ "$UPLOAD_TESTFLIGHT" = "true" ]; then
            xcodebuild archive \
              -project MagRabbit.xcodeproj \
              -scheme MagRabbit \
              -configuration Release \
              -destination generic/platform=iOS \
              -archivePath ./build/MagRabbit.xcarchive \
              -derivedDataPath ./build/DerivedData \
              -allowProvisioningUpdates \
              -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8" \
              -authenticationKeyID "$APPSTORE_KEY_ID" \
              -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID" \
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
              CODE_SIGN_STYLE=Automatic \
              CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER"
          else
            xcodebuild archive \
              -project MagRabbit.xcodeproj \
              -scheme MagRabbit \
              -configuration Release \
              -destination generic/platform=iOS \
              -archivePath ./build/MagRabbit.xcarchive \
              -derivedDataPath ./build/DerivedData \
              CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          fi

      - name: Create IPA
        env:
          UPLOAD_TESTFLIGHT: ${{ github.event_name == 'push' || inputs.upload_testflight || inputs.submit_app_review }}
          APPSTORE_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p build/export

          if [ "$UPLOAD_TESTFLIGHT" = "true" ]; then
            cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
          </dict>
          </plist>
          PLIST

            xcodebuild -exportArchive \
              -archivePath ./build/MagRabbit.xcarchive \
              -exportPath ./build/export \
              -exportOptionsPlist ./build/ExportOptions.plist \
              -allowProvisioningUpdates \
              -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8" \
              -authenticationKeyID "$APPSTORE_KEY_ID" \
              -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID"
          else
            APP_PATH="./build/MagRabbit.xcarchive/Products/Applications/MagRabbit.app"
            mkdir -p build/Payload
            cp -r "$APP_PATH" build/Payload/
            cd build && zip -r export/MagRabbit.ipa Payload && cd ..
          fi

      - name: Setup Ruby
        if: ${{ github.event_name == 'push' || inputs.upload_testflight || inputs.submit_app_review }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - name: Install Fastlane
        if: ${{ github.event_name == 'push' || inputs.upload_testflight || inputs.submit_app_review }}
        run: gem install fastlane

      - name: Upload to TestFlight with Fastlane
        if: ${{ github.event_name == 'push' || inputs.upload_testflight || inputs.submit_app_review }}
        env:
          API_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.AUTHKEY }}
        run: |
          # Setup API Key
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          # Verify API key file exists
          if [ ! -f ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8 ]; then
            echo "ERROR: API key file not created"
            exit 1
          fi

          # Upload via Fastlane
          fastlane upload_testflight ipa_path:./build/export/MagRabbit.ipa api_key_path:$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Set free App Store pricing
        if: ${{ inputs.submit_app_review }}
        env:
          AUTHKEY_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          AUTHKEY_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          AUTHKEY: ${{ secrets.AUTHKEY }}
        run: |
          chmod +x ./scripts/set_free_pricing.sh
          ./scripts/set_free_pricing.sh

      - name: Submit to App Review with Fastlane
        if: ${{ inputs.submit_app_review }}
        env:
          API_KEY_ID: ${{ secrets.AUTHKEY_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.AUTHKEY_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.AUTHKEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          fastlane submit_app_review build_number:${GITHUB_RUN_NUMBER} api_key_path:$HOME/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Save IPA as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MagRabbit-IPA
          path: ./build/export/MagRabbit.ipa
          retention-days: 30
